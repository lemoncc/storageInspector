<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>应用存储管理</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1 class="title">应用存储管理</h1>
        <div class="header-toolbar">
          <input
            id="keysFilterInput"
            class="keys-filter"
            type="text"
            placeholder="筛选 key"
            spellcheck="false"
            autocomplete="off"
            aria-label="筛选 Key"
          />
          <button id="refreshKeysBtn" class="btn btn-ghost" type="button">刷新</button>
          <button id="viewAllJsonBtn" class="btn btn-ghost" type="button">JSON查看</button>
          <button id="editAllJsonBtn" class="btn btn-ghost" type="button">JSON编辑</button>
          <button id="exportBtn" class="btn btn-ghost" type="button">导出</button>
          <button id="importBtn" class="btn btn-ghost" type="button">导入</button>
          <button id="clearAllBtn" class="btn btn-ghost btn-ghost-danger" type="button">清空</button>
          <input id="importFileInput" type="file" accept="application/json,.json" hidden />
        </div>
      </header>

      <section class="tab-section" id="storageTypeTabs" role="tablist" aria-label="存储类型">
        <button
          class="tab-item is-active"
          type="button"
          role="tab"
          data-type="localStorage"
          aria-selected="true"
          tabindex="0"
        >
          localStorage
        </button>
        <button
          class="tab-item"
          type="button"
          role="tab"
          data-type="sessionStorage"
          aria-selected="false"
          tabindex="-1"
        >
          sessionStorage
        </button>
        <button
          class="tab-item"
          type="button"
          role="tab"
          data-type="cookie"
          aria-selected="false"
          tabindex="-1"
        >
          cookie
        </button>
      </section>

      <div class="cookie-bar" id="cookieOptions" hidden>
        <div class="cookie-bar-head">
          <span class="cookie-bar-title">Cookie 属性（选中行 / 新增时生效，支持 HttpOnly）</span>
          <div class="cookie-flags">
            <label class="cookie-secure">
              <input id="cookieSecure" type="checkbox" />
              <span>Secure</span>
            </label>
            <label class="cookie-secure">
              <input id="cookieHttpOnly" type="checkbox" />
              <span>HttpOnly</span>
            </label>
          </div>
        </div>
        <div class="cookie-bar-fields">
          <label class="cookie-cell">
            <span class="cookie-cell-label">Path</span>
            <input id="cookiePath" class="cookie-control" type="text" value="/" spellcheck="false" />
          </label>
          <label class="cookie-cell">
            <span class="cookie-cell-label">Max-Age</span>
            <input
              id="cookieMaxAge"
              class="cookie-control"
              type="number"
              min="0"
              placeholder="秒，空=会话/保持原过期"
              title="留空：会话 cookie；若刚读取过带过期的 cookie，则保持原过期时间。填写秒数则按相对时间重写。"
              spellcheck="false"
            />
          </label>
          <label class="cookie-cell">
            <span class="cookie-cell-label">Domain</span>
            <input id="cookieDomain" class="cookie-control" type="text" placeholder="可选" spellcheck="false" />
          </label>
          <label class="cookie-cell">
            <span class="cookie-cell-label">SameSite</span>
            <select id="cookieSameSite" class="cookie-control">
              <option value="">默认</option>
              <option value="Lax">Lax</option>
              <option value="Strict">Strict</option>
              <option value="None">None</option>
            </select>
          </label>
        </div>
      </div>

      <section class="table-section">
        <div class="table-scroll">
          <table class="storage-table" aria-label="存储条目">
            <thead>
              <tr>
                <th class="col-key" scope="col">Key</th>
                <th class="col-value" scope="col">值</th>
                <th class="col-actions" scope="col">操作</th>
              </tr>
            </thead>
            <tbody id="storageTableBody"></tbody>
          </table>
          <p id="keysEmptyTip" class="keys-empty" hidden>暂无 key</p>
        </div>
        <div class="table-footer">
          <button id="addRowBtn" class="btn btn-primary btn-add" type="button">+ 增加</button>
          <p id="statusText" class="status" role="status" aria-live="polite"></p>
        </div>
      </section>
    </div>

    <dialog id="confirmDialog" class="confirm-dialog">
      <form method="dialog" class="confirm-form">
        <h2 id="confirmTitle" class="confirm-title"></h2>
        <pre id="confirmBody" class="confirm-body"></pre>
        <div class="confirm-actions">
          <button value="cancel" class="btn btn-secondary" type="submit">取消</button>
          <button id="confirmOkBtn" value="ok" class="btn btn-primary" type="submit">确认</button>
        </div>
      </form>
    </dialog>

    <dialog id="jsonDialog" class="json-dialog">
      <form method="dialog" class="json-dialog-form" id="jsonDialogForm">
        <div class="json-dialog-head">
          <h2 id="jsonDialogTitle" class="json-dialog-title">JSON</h2>
          <p id="jsonDialogKey" class="json-dialog-key"></p>
        </div>
        <textarea
          id="jsonDialogEditor"
          class="json-dialog-editor"
          spellcheck="false"
          aria-label="JSON 内容"
        ></textarea>
        <p id="jsonDialogMeta" class="json-dialog-meta"></p>
        <div class="json-dialog-actions">
          <button id="jsonFormatBtn" class="btn btn-ghost" type="button">格式化</button>
          <button id="jsonCompressBtn" class="btn btn-ghost" type="button">压缩</button>
          <button id="jsonCopyBtn" class="btn btn-ghost" type="button">复制</button>
          <button id="jsonApplyBtn" class="btn btn-primary" type="button" value="apply">应用到行</button>
          <button id="jsonCloseBtn" class="btn btn-secondary" type="submit" value="cancel">关闭</button>
        </div>
      </form>
    </dialog>

    <script src="index.js"></script>
  </body>
</html>
